global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: node          # host metrics (CPU, RAM, disk, net)
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: cadvisor      # per-container metrics
    static_configs:
      - targets: ['cadvisor:8080']
  # In production, add SNMP / device targets here (or run Zabbix alongside).
